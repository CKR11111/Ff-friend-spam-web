<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CKR PRO</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
        
        body {
            background: #000;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .glass-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            width: 310px;
            padding: 40px 25px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        h1 { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 5px; }
        .spam-text { font-size: 10px; color: #888; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 30px; }

        input {
            width: 100%;
            padding: 16px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 18px;
            color: #fff;
            text-align: center;
            font-size: 16px;
            margin-bottom: 20px;
            outline: none;
        }

        button {
            width: 100%;
            padding: 16px;
            background: #fff;
            color: #000;
            border: none;
            border-radius: 18px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
        }

        button:active { transform: scale(0.96); opacity: 0.8; }

        /* SIMPLE TERMINAL */
        .term {
            margin-top: 25px;
            background: rgba(0,0,0,0.4);
            border-radius: 15px;
            padding: 12px;
            height: 80px;
            font-family: monospace;
            font-size: 10px;
            text-align: left;
            border: 1px solid rgba(255,255,255,0.05);
            overflow: hidden;
        }
        .log { color: #00ff00; opacity: 0.8; margin-bottom: 4px; }

        .footer { margin-top: 25px; font-size: 10px; color: #444; font-weight: 600; }
    </style>
</head>
<body>

    <div class="glass-container">
        <h1>CKR PRO</h1>
        <div class="spam-text">REQUEST SPAM</div>

        <input type="number" id="target_id" placeholder="Target Player ID">
        <button id="btn" onclick="start()">Execute Attack</button>

        <div class="term" id="term">
            <div class="log">> System Ready...</div>
        </div>

        <div class="footer">BY MAHENDRA SUNAR</div>
    </div>

    <script>
        function addLog(msg) {
            const term = document.getElementById('term');
            const div = document.createElement('div');
            div.className = 'log';
            div.innerHTML = `> ${msg}`;
            term.prepend(div);
            if(term.childNodes.length > 4) term.lastChild.remove();
        }

        async function start() {
            const tid = document.getElementById('target_id').value;
            const btn = document.getElementById('btn');

            if(!tid) return Swal.fire({ icon: 'error', title: 'Error', text: 'Enter Player ID', background: '#111', color: '#fff' });

            btn.disabled = true; btn.innerText = "Running...";
            addLog(`Target: ${tid} Locked.`);

            try {
                const res = await fetch('/spam', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({target: tid})
                });
                const data = await res.json();

                if(res.ok) {
                    addLog(`Success: ${data.total} IDs Sent.`);
                    Swal.fire({ icon: 'success', title: 'Started', text: 'Attack running in background', background: '#111', color: '#fff', timer: 1500, showConfirmButton: false });
                } else {
                    addLog(`Error: ${data.error}`);
                }
            } catch (e) {
                addLog(`Connection Error!`);
            } finally {
                btn.disabled = false; btn.innerText = "Execute Attack";
            }
        }
    </script>
</body>
</html>
