<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CKR PRO - VISIT + REQUEST</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --gold: #ffd700;
            --deep-blue: #0a0e1a;
            --glass: rgba(255, 255, 255, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

        body {
            background: var(--deep-blue);
            background-image: radial-gradient(circle at top right, #1a2a4a, #050810);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            overflow: hidden;
        }

        .iphone-card {
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            width: 340px;
            padding: 45px 25px;
            border-radius: 45px;
            border: 1px solid rgba(255, 215, 0, 0.15);
            text-align: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
            position: relative;
        }

        h1 { font-size: 26px; color: var(--gold); letter-spacing: 2px; text-shadow: 0 0 10px rgba(255, 215, 0, 0.3); }
        .banner-text { font-size: 10px; color: #aaa; letter-spacing: 3px; margin-bottom: 35px; font-weight: 600; }

        .input-wrapper {
            background: rgba(0,0,0,0.5);
            border: 1px solid #222;
            padding: 18px;
            border-radius: 20px;
            margin-bottom: 25px;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
        }

        input {
            width: 100%;
            background: transparent;
            border: none;
            color: white;
            text-align: center;
            font-size: 18px;
            outline: none;
            font-weight: 500;
        }

        button {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #d4af37, #ffd700);
            border: none;
            border-radius: 20px;
            color: #000;
            font-weight: 800;
            font-size: 14px;
            cursor: pointer;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase;
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.2);
        }

        button:active { transform: scale(0.95); opacity: 0.8; }

        /* TERMINAL LOGS */
        .terminal-box {
            margin-top: 30px;
            background: rgba(0,0,0,0.7);
            border-radius: 18px;
            padding: 15px;
            height: 110px;
            border: 1px solid rgba(255,215,0,0.1);
            font-family: 'Courier New', monospace;
            text-align: left;
            overflow: hidden;
        }

        .t-line { font-size: 10px; color: #ffd700; margin-bottom: 5px; opacity: 0.8; }

        .footer { margin-top: 25px; font-size: 10px; color: #444; font-weight: bold; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div class="iphone-card">
        <h1>CKR PRO</h1>
        <div class="banner-text">VISIT + REQUEST SPAM</div>

        <div class="input-wrapper">
            <input type="number" id="target_id" placeholder="ENTER PLAYER ID">
        </div>

        <button id="btn" onclick="startSpam()">EXECUTE ATTACK</button>

        <div class="terminal-box" id="terminal">
            <div class="t-line">> System Initialized...</div>
            <div class="t-line">> Engine: Ultra-Fast Mode...</div>
        </div>

        <div class="footer">OWNER: MAHENDRA SUNAR</div>
    </div>

    <script>
        function log(msg) {
            const term = document.getElementById('terminal');
            const div = document.createElement('div');
            div.className = 't-line';
            div.innerHTML = `> ${msg}`;
            term.prepend(div);
            if(term.childNodes.length > 6) term.lastChild.remove();
        }

        async function startSpam() {
            const tid = document.getElementById('target_id').value;
            const btn = document.getElementById('btn');

            if(!tid) return Swal.fire({icon: 'error', title: 'Error', text: 'Enter Target UID', background: '#0a0e1a', color: '#ffd700'});

            btn.disabled = true; btn.innerText = "ATTACKING...";
            log(`Target Locked: ${tid}`);
            log(`Deploying Fast-Packets (50 req/s)...`);

            try {
                const res = await fetch('/spam', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({target: tid})
                });
                const data = await res.json();

                if(res.ok) {
                    log(`Success: ${data.total} Accs Processing.`);
                    Swal.fire({ 
                        icon: 'success', 
                        title: 'CKR UNKNOWN', 
                        text: 'Attack Running in Background', 
                        background: '#0a0e1a', 
                        color: '#ffd700', 
                        showConfirmButton: false, 
                        timer: 2000 
                    });
                } else {
                    log(`Error: ${data.error}`);
                }
            } catch (e) {
                log(`Server Connection Timed Out!`);
            } finally {
                btn.disabled = false; btn.innerText = "EXECUTE ATTACK";
            }
        }
    </script>
</body>
</html>
