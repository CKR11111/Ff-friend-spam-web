<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CKR PRO ULTIMATE</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --primary: #ffd700; /* Gold */
            --bg: #0a0e1a; /* Deep Blue Dark */
            --glass: rgba(255, 255, 255, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

        body {
            background: var(--bg);
            background-image: radial-gradient(circle at top right, #1e2a4a, #0a0e1a);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            overflow: hidden;
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            width: 340px;
            padding: 40px 25px;
            border-radius: 40px;
            border: 1px solid rgba(255, 215, 0, 0.2);
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            position: relative;
        }

        .card::before {
            content: '';
            position: absolute;
            top: -2px; left: -2px; right: -2px; bottom: -2px;
            border-radius: 42px;
            background: linear-gradient(45deg, transparent, rgba(255, 215, 0, 0.3), transparent);
            z-index: -1;
        }

        h1 { font-size: 24px; color: var(--primary); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 5px; }
        .subtitle { font-size: 10px; color: #888; letter-spacing: 4px; margin-bottom: 35px; }

        .input-box {
            background: rgba(0,0,0,0.4);
            border: 1px solid #222;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            background: transparent;
            border: none;
            color: white;
            text-align: center;
            font-size: 18px;
            outline: none;
        }

        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(90deg, #d4af37, #ffd700);
            border: none;
            border-radius: 15px;
            color: black;
            font-weight: 800;
            font-size: 14px;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }

        button:active { transform: scale(0.95); }

        /* TERMINAL STYLE */
        .terminal {
            margin-top: 30px;
            background: rgba(0,0,0,0.6);
            border-radius: 15px;
            padding: 15px;
            height: 120px;
            border: 1px solid rgba(255,215,0,0.1);
            font-family: 'Courier New', monospace;
            text-align: left;
            overflow: hidden;
        }

        .t-line { font-size: 10px; color: #ffd700; margin-bottom: 5px; opacity: 0.8; }

        .footer { margin-top: 25px; font-size: 10px; color: #444; font-weight: bold; }
    </style>
</head>
<body>

    <div class="card">
        <h1>CKR PRO</h1>
        <div class="subtitle">FREE FIRE REQUEST SPAM</div>

        <div class="input-box">
            <input type="number" id="target_id" placeholder="ENTER PLAYER ID">
        </div>

        <button id="btn" onclick="startSpam()">EXECUTE ATTACK</button>

        <div class="terminal" id="term">
            <div class="t-line">> System Initialized...</div>
            <div class="t-line">> Engine: High-Speed Mode...</div>
        </div>

        <div class="footer">MAHENDRA SUNAR • CKR UNKNOWN</div>
    </div>

    <script>
        function log(msg) {
            const term = document.getElementById('term');
            const div = document.createElement('div');
            div.className = 't-line';
            div.innerHTML = `> ${msg}`;
            term.prepend(div);
            if(term.childNodes.length > 7) term.lastChild.remove();
        }

        async function startSpam() {
            const tid = document.getElementById('target_id').value;
            const btn = document.getElementById('btn');

            if(!tid) return Swal.fire({icon: 'error', title: 'Empty', text: 'Enter Target ID', background: '#0a0e1a', color: '#ffd700'});

            btn.disabled = true; btn.innerText = "RUNNING...";
            log(`Target Locked: ${tid}`);
            log(`Launching Super-Fast Packets...`);

            try {
                const res = await fetch('/spam', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({target: tid})
                });
                const data = await res.json();

                if(res.ok) {
                    log(`Success: ${data.total} Accs Active.`);
                    Swal.fire({ icon: 'success', title: 'CKR ATTACK', text: 'System Running in Background', background: '#0a0e1a', color: '#ffd700', showConfirmButton: false, timer: 2000 });
                } else {
                    log(`Error: ${data.error}`);
                }
            } catch (e) {
                log(`Network Lag Detected!`);
            } finally {
                btn.disabled = false; btn.innerText = "EXECUTE ATTACK";
            }
        }
    </script>
</body>
</html>
